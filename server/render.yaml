services:
  # Node.js Backend API
  - type: web
    name: codecouncil-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # User needs to enter this in the Render dashboard manually
      - key: GROQ_API_KEY
        sync: false # User needs to enter this in the Render dashboard manually
      - key: XAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
